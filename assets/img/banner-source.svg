  <text x="235" y="268" fill="#00FF7F" opacity=".17" font-family="Manrope, Inter, system-ui, sans-serif" font-size="1060" font-weight="800" text-anchor="middle" dominant-baseline="central">σ</text>
  <text x="650" y="462" fill="#F5F5F5" font-family="Manrope, Inter, system-ui, sans-serif" font-size="174" font-weight="800" letter-spacing="0">SigmaBet</text>
  <text x="96" y="780" fill="#00FF7F" font-family="JetBrains Mono, IBM Plex Mono, ui-monospace, monospace" font-size="32" font-weight="850" letter-spacing="18">&gt; DATOS · ANÁLISIS · DISCIPLINA</text>
</svg>
